<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REVALENTINE APPS</title>
    <style>
        :root { --primary: #007bff; --accent: #00d4ff; --bg: #000; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; overflow-x: hidden;
            background-image: linear-gradient(rgba(0, 123, 255, 0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 123, 255, 0.2) 1px, transparent 1px);
            background-size: 45px 45px; animation: backgroundScroll 25s linear infinite;
        }
        @keyframes backgroundScroll { from { background-position: 0 0; } to { background-position: 0 450px; } }
        .container { max-width: 500px; margin: 0 auto; }
        
        h1 { font-size: 2.2em; text-align: center; text-transform: uppercase; margin: 20px 0; animation: mobileGlitch 4s infinite; }
        @keyframes mobileGlitch { 0%, 100% { text-shadow: 2px 2px var(--primary); } 50% { text-shadow: -2px -1px #ff0055; transform: scale(1.01); } }

        .update-card { background: rgba(15, 15, 15, 0.95); border-radius: 18px; padding: 20px; margin-bottom: 20px; border: 1px solid #1a1a1a; backdrop-filter: blur(10px); }
        .btn { display: block; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; padding: 14px; text-decoration: none; border-radius: 12px; font-weight: bold; text-align: center; margin-top: 10px; border: none; text-transform: uppercase; }

        /* ИГРОВАЯ ЗОНА */
        #game-section { border: 2px solid var(--accent); position: relative; text-align: center; }
        #pongCanvas { background: #000; width: 100%; height: 250px; border-radius: 10px; touch-action: none; display: block; }
        #game-ui { display: flex; justify-content: space-around; margin-bottom: 10px; font-weight: bold; color: var(--accent); }
        
        #game-over { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; border-radius: 16px;
        }

        /* ЛИДЕРБОРД */
        #leaderboard { display: none; margin-top: 15px; background: #0a0a0a; border: 1px solid #333; border-radius: 12px; padding: 10px; font-size: 0.9em; }
        .leader-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; }
        .gold { color: gold; }

        footer { text-align: center; margin-top: 40px; color: #444; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h1>👷‍♂️ REVALENTINE</h1>

    <!-- SubBird -->
    <div class="update-card" style="border-left: 4px solid var(--accent);">
        <h2>SubBird GAME V0.1</h2>
        <a href="https://github.com" class="btn">Скачать Игру</a>
    </div>

    <!-- ИГРА ПОНГ -->
    <div class="update-card" id="game-section">
        <div id="game-ui">
            <span>СЧЕТ: <span id="score">0</span></span>
            <span>РЕКОРД: <span id="highScore">0</span></span>
        </div>
        
        <canvas id="pongCanvas"></canvas>

        <div id="game-over">
            <h2 style="color:#ff0055">ИГРА ОКОНЧЕНА</h2>
            <button class="btn" onclick="resetGame()" style="width: 150px;">РЕСТАРТ</button>
            <button class="btn" onclick="toggleLeaderboard()" style="width: 150px; background: #333;">ЛИДЕРЫ</button>
        </div>

        <div id="leaderboard">
            <h3 style="margin-top:0">🏆 ТОП ИГРОКОВ</h3>
            <div class="leader-item gold"><span>1. Well (Dev)</span> <span>999</span></div>
            <div class="leader-item"><span>2. DrDonut</span> <span>154</span></div>
            <div class="leader-item"><span>3. Player_1</span> <span>42</span></div>
            <button class="btn" onclick="toggleLeaderboard()" style="font-size: 0.7em; padding: 5px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <!-- NCalc -->
    <div class="update-card">
        <h2>NCalc Calculator V0.2</h2>
        <a href="https://github.com" class="btn">Скачать APK</a>
    </div>

    <footer>© 2026 Well. Разработано на Python & HTML</footer>
</div>

<script>
    const canvas = document.getElementById("pongCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const highEl = document.getElementById("highScore");
    const gameOverMenu = document.getElementById("game-over");

    let score = 0;
    let highScore = localStorage.getItem("revalentine_record") || 0;
    highEl.innerText = highScore;

    let ball, paddle, gameRunning = true;

    function init() {
        ball = { x: canvas.width/2, y: 10, dx: 2, dy: 2, radius: 6, color: "#00d4ff" };
        paddle = { w: 70, h: 10, x: (canvas.width - 70) / 2 };
        score = 0;
        scoreEl.innerText = score;
    }

    function draw() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Мяч
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
        // Эффект огня
        if (score >= 50) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = "orange";
            ctx.fillStyle = "#ff4500";
        } else {
            ctx.shadowBlur = 0;
            ctx.fillStyle = ball.color;
        }
        ctx.fill(); ctx.closePath();

        // Платформа
        ctx.fillStyle = "#fff";
        ctx.fillRect(paddle.x, canvas.height - 15, paddle.w, paddle.h);

        // Столкновения со стенами
        if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) ball.dx = -ball.dx;
        if (ball.y + ball.dy < ball.radius) ball.dy = -ball.dy;

        // Столкновение с платформой
        if (ball.y + ball.dy > canvas.height - 15 - ball.radius) {
            if (ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                ball.dy = -ball.dy;
                score++;
                scoreEl.innerText = score;
                // Ускорение
                ball.dx *= 1.05; ball.dy *= 1.05;
                // Смена цветов
                if (score >= 40) ball.color = "#ff00ff";
                else if (score >= 30) ball.color = "#ffff00";
                else if (score >= 20) ball.color = "#00ff00";
                else if (score >= 10) ball.color = "#ff0055";
            } else {
                endGame();
            }
        }

        ball.x += ball.dx; ball.y += ball.dy;
        requestAnimationFrame(draw);
    }

    function endGame() {
        gameRunning = false;
        gameOverMenu.style.display = "flex";
        if (score > highScore) {
            highScore = score;
            localStorage.setItem("revalentine_record", highScore);
            highEl.innerText = highScore;
        }
    }

    function resetGame() {
        gameOverMenu.style.display = "none";
        gameRunning = true;
        init();
        draw();
    }

    function toggleLeaderboard() {
        const lb = document.getElementById("leaderboard");
        lb.style.display = lb.style.display === "block" ? "none" : "block";
    }

    // Управление
    canvas.addEventListener("touchmove", (e) => {
        let rect = canvas.getBoundingClientRect();
        let touchX = e.touches[0].clientX - rect.left;
        paddle.x = touchX - paddle.w/2;
        if (paddle.x < 0) paddle.x = 0;
        if (paddle.x > canvas.width - paddle.w) paddle.x = canvas.width - paddle.w;
        e.preventDefault();
    }, {passive: false});

    init();
    draw();
</script>

</body>
</html>
